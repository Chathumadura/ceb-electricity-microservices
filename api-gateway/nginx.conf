events {
    worker_connections 1024;
}

http {
    upstream customer_service {
        server customer_service:3001;
    }

    upstream meter_service {
        server meter_service:3002;
    }

    upstream bill_service {
        server bill_service:3003;
    }

    upstream payment_service {
        server payment_service:3004;
    }

    server {
        listen 8080;

        # Health check
        location /health {
            return 200 '{"status":"healthy","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # Customer Service
        location /api/customers {
            proxy_pass http://customer_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Meter Service
        location /api/meters {
            proxy_pass http://meter_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Bill Service
        location /api/bills {
            proxy_pass http://bill_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Payment Service
        location /api/payments {
            proxy_pass http://payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}